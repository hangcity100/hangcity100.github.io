<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>找零計算機｜快速付款按鈕</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #eef2f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
            padding: 16px;
        }

        /* 卡片容器 — 更緊湊，適合手機 */
        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            padding: 20px 18px 26px;
            transition: all 0.2s;
        }

        /* 標題區 */
        .title-section {
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h1::before {
            content: "🪙";
            font-size: 1.7rem;
        }
        .sub {
            font-size: 0.75rem;
            color: #4b5563;
            background: #f1f5f9;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            margin-top: 6px;
        }

        /* 輸入區塊 */
        .input-field {
            background: #ffffff;
            border-radius: 28px;
            margin-bottom: 18px;
            transition: all 0.1s;
        }

        .label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #334155;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: -0.2px;
        }

        .amount-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1.4rem;
            font-weight: 500;
            border: 2px solid #e2e8f0;
            border-radius: 44px;
            background: #fefefe;
            text-align: right;
            color: #0f172a;
            outline: none;
            transition: 0.15s;
            font-family: monospace;
        }

        .amount-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        /* 快捷按鈕區域 — 緊湊但是好按 */
        .quick-section {
            background: #f8fafd;
            border-radius: 38px;
            padding: 14px 12px;
            margin: 10px 0 16px 0;
            border: 1px solid #eef2ff;
        }

        .quick-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #2c3e5c;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .button-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .money-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 10px 0;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            width: 70px;
            text-align: center;
            color: #1e40af;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .money-btn:active {
            transform: scale(0.94);
            background: #eef2ff;
        }

        /* 自適應調整按鈕寬度，小螢幕略縮 */
        @media (max-width: 480px) {
            .money-btn {
                width: 64px;
                font-size: 0.9rem;
                padding: 8px 0;
            }
            .amount-input {
                font-size: 1.25rem;
                padding: 12px 16px;
            }
        }

        /* 操作按鈕雙排 */
        .action-row {
            display: flex;
            gap: 14px;
            margin: 14px 0 10px;
        }
        .btn-calc {
            flex: 2;
            background: #3b82f6;
            border: none;
            border-radius: 60px;
            padding: 12px 0;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: 0.1s;
        }
        .btn-calc:active {
            background: #2563eb;
            transform: scale(0.97);
        }
        .btn-reset {
            flex: 1;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #334155;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-reset:active {
            background: #e2e8f0;
            transform: scale(0.97);
        }

        /* 找零顯示區塊 — 放在付款金額正下方，更緊湊 */
        .change-area {
            background: #0f172a;
            border-radius: 32px;
            padding: 14px 18px;
            margin: 8px 0 4px 0;
            text-align: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 4px 12px rgba(0,0,0,0.1);
        }
        .change-label {
            color: #94a3b8;
            font-size: 0.7rem;
            letter-spacing: 1px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .change-value-large {
            font-size: 2rem;
            font-weight: 800;
            color: #facc15;
            line-height: 1.2;
            word-break: break-word;
        }
        .error-tip {
            font-size: 0.7rem;
            color: #facc15;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 2px 10px;
            border-radius: 40px;
            margin-top: 6px;
        }

        /* 輔助提示小字 */
        .helper-note {
            font-size: 0.65rem;
            color: #64748b;
            text-align: center;
            margin-top: 16px;
            border-top: 1px solid #eef2ff;
            padding-top: 12px;
        }

        /* 手動輸入時一開始需覆蓋 0 (聚焦時全選或行為友善) */
        .amount-input:focus {
            background-color: #fffdf7;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="title-section">
        <h1>找零助手</h1>
        <div class="sub">付款金額 − 總金額 = 找零</div>
    </div>

    <!-- 總金額欄位 -->
    <div class="input-field">
        <div class="label">
            <span>🧾 總金額 (應付)</span>
        </div>
        <input type="number" id="totalAmount" class="amount-input" placeholder="0" value="0" step="any" inputmode="decimal">
    </div>

    <!-- 付款金額欄位 -->
    <div class="input-field">
        <div class="label">
            <span>💵 付款金額 (實收)</span>
            <span style="font-size:0.65rem; background:#eef2ff; padding:2px 8px; border-radius:20px;">可手動/按鈕累加</span>
        </div>
        <input type="number" id="paidAmount" class="amount-input" placeholder="0" value="0" step="any" inputmode="decimal">
    </div>

    <!-- 找零區塊：緊緊跟在付款金額下方 -->
    <div class="change-area" id="changeArea">
        <div class="change-label">🔄 找零金額</div>
        <div class="change-value-large" id="changeDisplay">0</div>
        <div id="errorMessage" class="error-tip"></div>
    </div>

    <!-- 快速付款按鈕區塊 -->
    <div class="quick-section">
        <!--div class="quick-title">
            ⚡ 快速加錢 &nbsp;|&nbsp; 點擊即累加至付款金額
        </div--->
        <div class="button-grid">
            <button class="money-btn" data-value="1000">$1,000</button>
            <button class="money-btn" data-value="500">$500</button>
            <button class="money-btn" data-value="100">$100</button>
            <button class="money-btn" data-value="50">$50</button>
            <button class="money-btn" data-value="10">$10</button>
            <button class="money-btn" data-value="1">$1</button>
        </div>
        <!--div style="font-size: 0.65rem; text-align: center; margin-top: 8px; color: #3b4e6b;">
            ✨ 例如：$500按2次 + $100按1次 + $10按3次 → 付款顯示 $1,130
        </div--->
    </div>

    <!-- 主要控制按鈕 計算找零 & 歸零 -->
    <div class="action-row">
        <button class="btn-calc" id="calculateBtn">💰 計算找零</button>
        <button class="btn-reset" id="resetBtn">🗑️ 歸零</button>
    </div>
    <div class="helper-note">
        💡 點擊付款金額輸入框可手動修改，數值會直接覆蓋原有金額；按「計算找零」即顯示正確找零。
    </div>
</div>

<script>
    (function() {
        // ---------- DOM 元素 ----------
        const totalInput = document.getElementById('totalAmount');
        const paidInput = document.getElementById('paidAmount');
        const calculateBtn = document.getElementById('calculateBtn');
        const resetBtn = document.getElementById('resetBtn');
        const changeDisplaySpan = document.getElementById('changeDisplay');
        const errorMsgSpan = document.getElementById('errorMessage');

        // ---------- 輔助函數：取得安全的數字 (總金額/付款金額，支援小數) ----------
        function getSafeNumber(valueInput, defaultValue = 0) {
            let raw = valueInput.value.trim();
            if (raw === "") return defaultValue;
            let num = Number(raw);
            if (isNaN(num)) return defaultValue;
            if (num < 0) return 0;      // 金額不允許負數
            // 保留兩位小數精度，但不強制修改顯示，只回傳計算值
            return parseFloat(num.toFixed(10)); // 解決浮點疑慮但保留原始值
        }

        // 設定付款金額值 (並更新輸入框，會保留兩位小數格式化，但若為整數則顯示整數)
        function setPaidAmountValue(value) {
            // 保留小數後兩位並去除多餘尾數，使畫面乾淨
            let numericVal = parseFloat(value);
            if (isNaN(numericVal)) numericVal = 0;
            if (numericVal < 0) numericVal = 0;
            // 格式化顯示：小數點最多兩位，無用零移除
            let formatted;
            if (Number.isInteger(numericVal)) {
                formatted = numericVal.toString();
            } else {
                formatted = numericVal.toFixed(2).replace(/\.?0+$/, '');
                if (formatted === "") formatted = "0";
                if (formatted.endsWith('.')) formatted = formatted.slice(0, -1);
            }
            paidInput.value = formatted;
            // 每次設定付款金額時，也一併清除錯誤提示 (但不清除找零，避免干擾，找零需重新按鈕)
            clearErrorOnly();
        }

        // 設定總金額時也做格式化 (保留視覺一致性)
        function setTotalAmountValue(value) {
            let numericVal = parseFloat(value);
            if (isNaN(numericVal)) numericVal = 0;
            if (numericVal < 0) numericVal = 0;
            let formatted;
            if (Number.isInteger(numericVal)) {
                formatted = numericVal.toString();
            } else {
                formatted = numericVal.toFixed(2).replace(/\.?0+$/, '');
                if (formatted === "") formatted = "0";
                if (formatted.endsWith('.')) formatted = formatted.slice(0, -1);
            }
            totalInput.value = formatted;
        }

        // 取得目前總金額 (數字)
        function getTotal() {
            return getSafeNumber(totalInput, 0);
        }

        // 取得目前付款金額 (數字)
        function getPaid() {
            return getSafeNumber(paidInput, 0);
        }

        // 清除錯誤訊息
        function clearErrorOnly() {
            errorMsgSpan.innerText = "";
        }

        // 顯示錯誤 (同時不清除找零數字，但可給予警示)
        function showErrorMessage(msg) {
            errorMsgSpan.innerText = msg;
        }

        // 核心：計算找零，更新找零顯示區塊 (置於付款金額下方)
        function updateChange() {
            // 先確保輸入框的值矯正（非負, 合理的數字格式）
            // 避免總金額或付款金額有奇怪小數導致顯示異常，但不會影響計算正確性
            const total = getTotal();
            const paid = getPaid();

            const changeRaw = paid - total;
            // 格式化金額 兩位小數最多, 但不顯示多餘尾數
            const formatCurrency = (num) => {
                let fixedNum = parseFloat(num);
                if (isNaN(fixedNum)) return "0";
                // 處理非常小的浮點誤差 (例如 0.1+0.2)
                fixedNum = Math.round(fixedNum * 100) / 100;
                if (Number.isInteger(fixedNum)) {
                    return fixedNum.toString();
                } else {
                    return fixedNum.toFixed(2);
                }
            };

            const formattedChange = formatCurrency(changeRaw);
            changeDisplaySpan.innerText = formattedChange;

            // 判斷找零狀況 (小於0 => 付款不足)
            if (changeRaw < 0) {
                const short = formatCurrency(Math.abs(changeRaw));
                showErrorMessage(`⚠️ 付款不足，尚欠 ${short} 元`);
            } else if (changeRaw === 0) {
                showErrorMessage("✔️ 金額恰好，無需找零");
            } else {
                // 正常找零，清除錯誤訊息 (僅保留正面提示可選，但沒錯誤就不顯示紅字)
                errorMsgSpan.innerText = "";
            }
        }

        // ---------- 手動輸入時需「一開始覆蓋0」的體驗 ----------
        // 需求：當使用者點擊輸入框時，如果原本數值是 "0" 或空值，讓使用者輸入會直接覆蓋。
        // 一般 input 類型 number 是選取後編輯，但為了符合「手動輸入時一開始須覆蓋0」，
        // 我們在取得焦點時( focus )，如果目前的值是 '0' 或者 內容為 "0.00" 之類，全選內容讓輸入直接取代。
        // 但是為了更貼近「覆蓋0」的意思，也可簡化為: 當 focus 時自動全選文字，這樣鍵入會直接替換掉0。
        // 另外也確保使用者手動輸入非零數值後，不會強迫覆蓋。
        function enhanceInputCoverZero(inputElement) {
            if (!inputElement) return;
            inputElement.addEventListener('focus', function(e) {
                // 如果目前的數值為 "0" 或 "0.0" 或 "0.00" 或 數字0
                let currentVal = inputElement.value.trim();
                let numeric = parseFloat(currentVal);
                if (currentVal === "" || (numeric === 0 && currentVal.includes('0'))) {
                    // 全選輸入框內容，讓用戶打字會直接覆蓋掉原本的0
                    inputElement.select();
                } else {
                    // 如果非0，依然可以全選讓用戶方便修改，但並非強制，但不會造成困擾
                    inputElement.select();
                }
            });
        }

        // ---------- 累加功能 (點擊快速按鈕) ----------
        function addToPaid(amount) {
            let currentPaid = getPaid();
            // 避免浮點誤差 加法 (金額小數點最多兩位)
            let newPaid = currentPaid + amount;
            // 保留兩位小數精度
            newPaid = Math.round(newPaid * 100) / 100;
            if (newPaid < 0) newPaid = 0;
            setPaidAmountValue(newPaid);
            // 因為付款金額變更後，不清除找零結果，但是為了操作直覺，可不清除結果，但使用者需按計算找零才更新
            // 但這邊為了 UI 協調，我們可以選擇不自動計算（根據需求最後按找零按鈕才計算）。
            // 但是由於找零顯示在付款金額下方，使用者可能會困惑，但題目要求最後按找零button 才會顯示找零金額，完全遵守。
            // 但為了不讓舊的找零數字誤導，累加後可保持之前的找零顯示，直到按計算。但是也可以做視覺提示？
            // 為了符合規格: 按「找零button」才顯示找零金額。這裡累加僅改變付款金額，不自動重新計算。
            // 同時清除錯誤訊息，保留找零顯示區保持之前計算（不清除比較不會搞混，但可以待計算新結果）
            // 符合最終行為: 使用者在累加之後需要按「計算找零」獲得正確找零。完美。
            clearErrorOnly();
        }

        // 綁定快速付款按鈕
        function bindQuickButtons() {
            const btns = document.querySelectorAll('.money-btn');
            btns.forEach(btn => {
                // 移除舊監聽避免重複
                btn.removeEventListener('click', quickClickHandler);
                btn.addEventListener('click', quickClickHandler);
            });
            function quickClickHandler(e) {
                const valAttr = e.currentTarget.getAttribute('data-value');
                let addVal = parseInt(valAttr, 10);
                if (isNaN(addVal)) return;
                addToPaid(addVal);
            }
        }

        // 重置所有內容 (總金額=0, 付款金額=0, 找零歸零, 錯誤清空)
        function resetEverything() {
            setTotalAmountValue(0);
            setPaidAmountValue(0);
            // 計算找零狀態更新 (因為總金額和付款皆為0，找零為0)
            updateChange();   // 直接同步顯示找零0，並且清除錯誤狀態
            clearErrorOnly();
        }

        // 校正輸入框 確保非負且合理 (blur 時處理)
        function sanitizeOnBlur() {
            // 總金額校正
            totalInput.addEventListener('blur', () => {
                let rawTotal = getSafeNumber(totalInput, 0);
                setTotalAmountValue(rawTotal);
                // 注意: 不自動重新計算找零，保留最後計算結果直到按按鈕
                // 但為了避免錯誤顯示停留，不清除找零(使用者可能需要手動按計算)
                // 但提升體驗: 由於找零顯示區可能不匹配，但使用者會按「計算找零」按鈕，符合題意。
                // 但是為了讓視覺少一點誤導，我們不清除也不主動刷新，因為按鈕行為明確。
                // 但是如果總金額變動，不自動重新計算是正確的，因為規定要用找零按鈕觸發。
            });
            paidInput.addEventListener('blur', () => {
                let rawPaid = getSafeNumber(paidInput, 0);
                setPaidAmountValue(rawPaid);
                // 不清除找零，不自動計算，保持依賴按鈕。
                clearErrorOnly(); // 只是清錯誤訊息，避免舊錯誤干擾
            });
        }

        // 計算按鈕 : 執行找零顯示更新
        function onCalculate() {
            // 先同步矯正兩個輸入框顯示值 (避免浮點髒值)
            let totalNum = getSafeNumber(totalInput, 0);
            let paidNum = getSafeNumber(paidInput, 0);
            setTotalAmountValue(totalNum);
            setPaidAmountValue(paidNum);
            // 更新找零畫面
            updateChange();
        }

        // 附加額外處理: 手動輸入時，若使用者輸入負數，blur時會歸0，但focus覆蓋讓輸入更方便
        // 另外為了確保"手動輸入時一開始須覆蓋0"，我們增強焦點全選，並且當用戶點擊時，如果原本是0可以直接鍵入取代
        // 更進一步: 當使用者在付款金額手動輸入數字後，按下快速按鈕會在現有數值上累加，合乎邏輯。

        // 初始化所有功能
        function init() {
            bindQuickButtons();
            sanitizeOnBlur();
            // 註冊按鈕事件
            calculateBtn.addEventListener('click', onCalculate);
            resetBtn.addEventListener('click', resetEverything);

            // 增強兩個輸入框focus時全選 (達到覆蓋0或更方便編輯)
            enhanceInputCoverZero(totalInput);
            enhanceInputCoverZero(paidInput);

            // 額外: 一開始顯示所有預設0，找零顯示0，無錯誤
            setTotalAmountValue(0);
            setPaidAmountValue(0);
            updateChange();   // 初始找零0，無錯誤提示
            clearErrorOnly();
        }

        init();
    })();
</script>
</body>
</html>
