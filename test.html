<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LIFF測試</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h1>LIFF 啟動成功</h1>

<script>

async function main() {

  await liff.init({
    liffId: "你的LIFFID"
  });

  if (!liff.isLoggedIn()) {
    liff.login();
  }

  const profile = await liff.getProfile();

  document.body.innerHTML +=
    "<p>歡迎：" + profile.displayName + "</p>";
}

main();

</script>

</body>
</html>

</body>
</html>
