<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>永勝關東煮 · 立即/預約點餐</title>
  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #fef7e8;
      font-family: system-ui, 'Segoe UI', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      padding: 20px 16px 40px;
      color: #2c221b;
    }

    .app-container {
      max-width: 600px;
      margin: 0 auto;
    }

    /* 店頭招牌 */
    .shop-header {
      background: linear-gradient(135deg, #f5b042 0%, #e67e22 100%);
      border-radius: 36px 36px 28px 28px;
      padding: 20px 20px 18px;
      margin-bottom: 20px;
      color: white;
      box-shadow: 0 8px 14px rgba(0,0,0,0.1);
      text-align: center;
    }
    .shop-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .shop-name::before { content: "🍢"; font-size: 1.9rem; }
    .shop-name::after { content: "🍜"; font-size: 1.9rem; }
    .shop-info {
      margin-top: 12px;
      font-size: 0.85rem;
      background: rgba(255,255,240,0.2);
      padding: 6px 12px;
      border-radius: 50px;
      display: inline-block;
      backdrop-filter: blur(2px);
    }
    .profile-area {
      background: #fff2e0;
      border-radius: 30px;
      padding: 8px 16px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      color: #b45f2b;
      border: 1px solid #ffdcb5;
    }

    /* 頁籤 */
    .tabs {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 6px;
      scrollbar-width: thin;
    }
    .tab-btn {
      background: #f7e4cd;
      border: none;
      padding: 10px 20px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 600;
      color: #a55318;
      white-space: nowrap;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: #e67e22;
      color: white;
      box-shadow: 0 4px 10px rgba(230,126,34,0.3);
    }
    .menu-panel { display: none; animation: fade 0.2s ease; }
    .menu-panel.active-panel { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }

    /* 餐點卡片 */
    .food-card {
      background: white;
      border-radius: 28px;
      margin-bottom: 12px;
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03), 0 1px 2px rgba(0,0,0,0.05);
      border: 1px solid #ffe0bf;
    }
    .food-info { flex: 2; }
    .food-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #3b2a21;
      margin-bottom: 6px;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
    }
    .price-tag {
      font-size: 0.8rem;
      background: #ffede0;
      padding: 3px 12px;
      border-radius: 20px;
      color: #c95a0f;
      font-weight: 500;
    }
    .food-desc { font-size: 0.7rem; color: #a47e5e; }
    .quantity-control {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fef5ea;
      padding: 6px 12px;
      border-radius: 50px;
    }
    .qty-btn {
      background: #ffcd94;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1.4rem;
      font-weight: bold;
      color: #7c3f0c;
      cursor: pointer;
      transition: 0.1s;
    }
    .qty-btn:active { background: #ffb95e; transform: scale(0.96);}
    .qty-number { font-size: 1.2rem; font-weight: 700; min-width: 32px; text-align: center; color: #4b2e1a; }
    .item-price-sum { font-size: 0.85rem; font-weight: 600; background: #fff0e2; padding: 3px 8px; border-radius: 30px; color: #e67e22; white-space: nowrap; }

    /* 訂單模式選擇器 + 預約時間 */
    .order-mode-card {
      background: #fff6ea;
      border-radius: 32px;
      padding: 16px 20px;
      margin: 18px 0 12px;
      border: 1px solid #ffdcb5;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .mode-title {
      font-weight: 800;
      font-size: 1rem;
      color: #b45a1c;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .mode-buttons {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    .mode-btn {
      flex: 1;
      background: #ffe3c9;
      border: none;
      padding: 12px 0;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: #a55318;
      cursor: pointer;
      transition: 0.1s;
    }
    .mode-btn.active-mode {
      background: #e67e22;
      color: white;
      box-shadow: 0 4px 8px rgba(230,126,34,0.3);
    }
    .reservation-panel {
      background: #fef0e2;
      border-radius: 28px;
      padding: 12px 16px;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .datetime-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .date-selector, .time-selector {
      flex: 1;
      background: white;
      border: 1px solid #ffcd94;
      border-radius: 40px;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #4b2e1a;
    }
    .time-note {
      font-size: 0.7rem;
      color: #c07c42;
      margin-top: 6px;
      text-align: center;
    }
    .inline-icon { font-size: 1.1rem; vertical-align: middle; }

    /* 底部 */
    .order-bar {
      position: sticky;
      bottom: 12px;
      background: rgba(255,248,235,0.96);
      backdrop-filter: blur(12px);
      border-radius: 44px;
      padding: 12px 20px;
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      border: 1px solid #ffdbb5;
      z-index: 10;
    }
    .total-amount {
      background: #e67e22;
      padding: 10px 18px;
      border-radius: 40px;
      color: white;
      font-weight: 800;
      font-size: 1.35rem;
    }
    .btn-group { display: flex; gap: 12px; }
    .action-btn {
      border: none;
      background: #ffb347;
      padding: 10px 18px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .action-btn.send { background: #e67e22; color: white; box-shadow: 0 4px 10px rgba(230,126,34,0.4);}
    .action-btn:active { transform: scale(0.97);}
    .note { font-size: 0.7rem; text-align: center; margin-top: 12px; color: #b87c48; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="shop-header">
    <div class="shop-name">永勝關東煮</div>
    <div class="shop-info">📞 0909-013-660 &nbsp;|&nbsp; 🏠 台南市永康區永康街119號</div>
  </div>
  <div id="profile" class="profile-area"></div>

  <!-- 立即/預約 選擇區塊 -->
  <div class="order-mode-card">
    <div class="mode-title"><span>⏱️</span> 取餐方式</div>
    <div class="mode-buttons">
      <button id="immediateModeBtn" class="mode-btn active-mode">🔥 立即取餐</button>
      <button id="reserveModeBtn" class="mode-btn">📅 預約訂餐</button>
    </div>
    <div id="reservationPanel" class="reservation-panel" style="display: none;">
      <div class="datetime-row">
        <select id="reserveDate" class="date-selector"></select>
        <select id="reserveTime" class="time-selector"></select>
      </div>
      <div class="time-note">🕚 預約時段：上午11:00 ~ 晚上7:00 (當天/隔天)</div>
    </div>
  </div>

  <!-- 分類頁籤 -->
  <div class="tabs" id="tabBar">
    <button class="tab-btn active" data-tab="tab1">🍢 關東煮</button>
    <button class="tab-btn" data-tab="tab2">🍚 飯類 / 麵類</button>
    <button class="tab-btn" data-tab="tab3">🥣 湯類 / 煎類</button>
    <button class="tab-btn" data-tab="tab4">🥗 小菜 / 小點</button>
  </div>

  <div id="tab1" class="menu-panel active-panel"></div>
  <div id="tab2" class="menu-panel"></div>
  <div id="tab3" class="menu-panel"></div>
  <div id="tab4" class="menu-panel"></div>

  <div class="order-bar">
    <div class="total-amount" id="liveTotal">NT$ 0</div>
    <div class="btn-group">
      <button class="action-btn" id="recalcBtn">⟳ 刷新</button>
      <button class="action-btn send" id="sendOrderBtn">📨 送出訂單</button>
    </div>
  </div>
  <div class="note">✅ 數量 +/- 即時累計金額．預約可選當天/隔天 11:00~19:00</div>
</div>

<script>
  // ----------------------------- 菜單 ---------------------------------
  const kantoMenu = [
    { name: "黑輪", price: 10, desc: "經典魚漿" }, { name: "米血", price: 10, desc: "Q軟米血糕" },
    { name: "魚板", price: 10, desc: "甜不辣風味" }, { name: "豬皮", price: 10, desc: "膠質滿滿" },
    { name: "菜頭", price: 10, desc: "清甜蘿蔔" }, { name: "真丸", price: 10, desc: "扎實貢丸" },
    { name: "魚豆腐", price: 10, desc: "軟嫩入味" }, { name: "北海貝(2個)", price: 15, desc: "海味雙鮮" },
    { name: "龍蝦棒", price: 15, desc: "鮮甜龍蝦風味" }, { name: "苦瓜封", price: 15, desc: "苦瓜鑲肉" }
  ];
  const riceNoodle = [
    { name: "肉燥飯", price: 35, desc: "香濃肉燥" }, { name: "雞肉飯", price: 45, desc: "火雞肉絲" },
    { name: "關東煮拌飯", price: 50, desc: "特色拌飯" }, { name: "烏龍麵", price: 65, desc: "Q彈烏龍" },
    { name: "意麵", price: 55, desc: "台南意麵" }, { name: "米粉", price: 55, desc: "細滑米粉" },
    { name: "王子麵", price: 35, desc: "經典泡麵" }
  ];
  const soupAndFried = [
    { name: "味噌湯", price: 35, desc: "傳統日式風味" }, { name: "貢丸湯", price: 35, desc: "清甜貢丸" },
    { name: "魚丸湯", price: 35, desc: "新鮮魚丸" }, { name: "菜頭湯", price: 35, desc: "原汁原味" },
    { name: "煎荷包蛋", price: 10, desc: "半熟/全熟" }, { name: "煎蘿蔔糕", price: 35, desc: "外酥內軟" },
    { name: "煎餃(5顆)", price: 45, desc: "酥脆煎餃" }
  ];
  const sideDishes = [
    { name: "燙青菜", price: 35, desc: "時令蔬菜" }, { name: "滷蛋", price: 15, desc: "入味滷蛋" },
    { name: "豆干", price: 20, desc: "滷豆干" }, { name: "海帶", price: 20, desc: "軟嫩海帶" },
    { name: "泡菜", price: 35, desc: "酸甜泡菜" }, { name: "涼拌小黃瓜", price: 35, desc: "清爽脆口" },
    { name: "豬耳朵", price: 40, desc: "煙燻脆耳" }
  ];

  let orderMap = new Map(); // key -> qty
  // 訂單模式: "now" 或 "reserve"
  let orderMode = "now";     // 立即
  let selectedReserveDate = "";   // YYYY-MM-DD
  let selectedReserveTime = "";    // HH:MM

  // 初始化Map
  function initOrderMap() {
    const allItems = [...kantoMenu, ...riceNoodle, ...soupAndFried, ...sideDishes];
    allItems.forEach((item, idx) => {
      const key = `${item.name}_${item.price}_${idx}`;
      if (!orderMap.has(key)) orderMap.set(key, 0);
    });
  }

  function getQty(key) { return orderMap.get(key) || 0; }
  function setQty(key, newQty) {
    if (newQty < 0) newQty = 0;
    orderMap.set(key, newQty);
    updateItemDisplay(key);
    updateTotalSum();
  }

  function updateItemDisplay(key) {
    const qtySpan = document.querySelector(`.qty-num[data-key='${key}']`);
    const sumSpan = document.querySelector(`.item-sum[data-key='${key}']`);
    if (qtySpan) {
      const qty = getQty(key);
      qtySpan.innerText = qty;
      const price = parseInt(qtySpan.getAttribute("data-price"), 10);
      if (sumSpan && !isNaN(price)) sumSpan.innerText = `NT$${price * qty}`;
    }
  }

  function updateTotalSum() {
    let total = 0;
    for (let [key, qty] of orderMap.entries()) {
      if (qty > 0) {
        const priceSpan = document.querySelector(`.qty-num[data-key='${key}']`);
        if (priceSpan) {
          const price = parseInt(priceSpan.getAttribute("data-price"), 10);
          if (!isNaN(price)) total += price * qty;
        } else {
          // fallback parse from key
          const parts = key.split('_');
          if (parts.length >= 2) { const p = parseInt(parts[1],10); if(!isNaN(p)) total += p * qty;}
        }
      }
    }
    document.getElementById("liveTotal").innerText = `NT$ ${total}`;
    return total;
  }

  // 渲染分類
  function renderCategory(containerId, itemsArray, categoryPrefix) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    itemsArray.forEach((item, idx) => {
      const uniqueKey = `${item.name}_${item.price}_${categoryPrefix}_${idx}`;
      if (!orderMap.has(uniqueKey)) orderMap.set(uniqueKey, 0);
      const currentQty = getQty(uniqueKey);
      const card = document.createElement('div');
      card.className = 'food-card';
      card.innerHTML = `
        <div class="food-info">
          <div class="food-name">${item.name}<span class="price-tag">$${item.price}</span></div>
          <div class="food-desc">${item.desc || '新鮮美味'}</div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
          <div class="quantity-control">
            <button class="qty-btn dec">−</button>
            <span class="qty-number qty-num" data-key="${uniqueKey}" data-price="${item.price}">${currentQty}</span>
            <button class="qty-btn inc">+</button>
          </div>
          <div class="item-price-sum item-sum" data-key="${uniqueKey}">NT$${item.price * currentQty}</div>
        </div>
      `;
      container.appendChild(card);
      const decBtn = card.querySelector('.dec');
      const incBtn = card.querySelector('.inc');
      decBtn.addEventListener('click', () => { let q = getQty(uniqueKey); if(q>0) setQty(uniqueKey, q-1); });
      incBtn.addEventListener('click', () => { let q = getQty(uniqueKey); setQty(uniqueKey, q+1); });
    });
  }

  function renderAllMenus() {
    renderCategory('tab1', kantoMenu, 'kanto');
    renderCategory('tab2', riceNoodle, 'ricenoodle');
    renderCategory('tab3', soupAndFried, 'soupfried');
    renderCategory('tab4', sideDishes, 'sidedish');
    updateTotalSum();
  }

  // 頁籤切換
  function initTabs() {
    const btns = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.menu-panel');
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const tabId = btn.getAttribute('data-tab');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        panels.forEach(p => p.classList.remove('active-panel'));
        document.getElementById(tabId)?.classList.add('active-panel');
      });
    });
  }

  // ---------- 預約時間邏輯 (當天/隔天 11:00~19:00，每30分鐘間隔) ----------
  function getTodayStr() { 
    const d = new Date(); 
    return d.toISOString().slice(0,10);
  }
  function getTomorrowStr() {
    const d = new Date();
    d.setDate(d.getDate()+1);
    return d.toISOString().slice(0,10);
  }
  function generateTimeOptions() {
    const times = [];
    for (let h = 11; h <= 19; h++) {
      for (let m = 0; m < 60; m += 30) {
        if (h === 19 && m > 0) continue; // 19:00 之後停止 最多19:00
        const hourStr = h.toString().padStart(2,'0');
        const minStr = m.toString().padStart(2,'0');
        times.push(`${hourStr}:${minStr}`);
      }
    }
    return times;
  }
  function populateDateSelector() {
    const dateSelect = document.getElementById('reserveDate');
    if (!dateSelect) return;
    const today = getTodayStr();
    const tomorrow = getTomorrowStr();
    dateSelect.innerHTML = '';
    const optionToday = document.createElement('option');
    optionToday.value = today;
    optionToday.textContent = `今天 ${today}`;
    const optionTomorrow = document.createElement('option');
    optionTomorrow.value = tomorrow;
    optionTomorrow.textContent = `明天 ${tomorrow}`;
    dateSelect.appendChild(optionToday);
    dateSelect.appendChild(optionTomorrow);
    // 預設今天
    dateSelect.value = today;
  }
  function populateTimeSelector() {
    const timeSelect = document.getElementById('reserveTime');
    if (!timeSelect) return;
    const times = generateTimeOptions();
    timeSelect.innerHTML = '';
    times.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      timeSelect.appendChild(opt);
    });
    // 預設最近一個大於當前時間的時段 (若立即模式不需預設保留，但預約面板開啟時可智慧)
    const now = new Date();
    const currentHour = now.getHours();
    const currentMin = now.getMinutes();
    let selectedIdx = 0;
    if (orderMode === 'reserve') {
      // 若是預約且今天日期，找到未來時間
      const selectedDate = document.getElementById('reserveDate').value;
      if (selectedDate === getTodayStr()) {
        for (let i = 0; i < times.length; i++) {
          const [hour, minute] = times[i].split(':').map(Number);
          if (hour > currentHour || (hour === currentHour && minute >= currentMin)) {
            selectedIdx = i;
            break;
          }
        }
      }
    }
    timeSelect.selectedIndex = selectedIdx;
  }

  // 更新預約面板顯示＆同步選擇的值
  function refreshReservationPanel() {
    const panel = document.getElementById('reservationPanel');
    if (orderMode === 'reserve') {
      panel.style.display = 'block';
      populateDateSelector();
      populateTimeSelector();
      // 綁定變動事件
      const dateSelect = document.getElementById('reserveDate');
      const timeSelect = document.getElementById('reserveTime');
      if (dateSelect && !dateSelect._listenerAttached) {
        dateSelect.addEventListener('change', () => {
          if(orderMode === 'reserve') populateTimeSelector(); // 日期變動重新整理時間選項(智慧預設)
        });
        dateSelect._listenerAttached = true;
      }
      if (timeSelect && !timeSelect._listenerAttached) {
        timeSelect.addEventListener('change', ()=>{});
        timeSelect._listenerAttached = true;
      }
      // 讀取初始值
      if(dateSelect) selectedReserveDate = dateSelect.value;
      if(timeSelect) selectedReserveTime = timeSelect.value;
    } else {
      panel.style.display = 'none';
    }
  }

  // 儲存預約選擇的值
  function updateReservationValues() {
    if (orderMode === 'reserve') {
      const dateSelect = document.getElementById('reserveDate');
      const timeSelect = document.getElementById('reserveTime');
      if (dateSelect) selectedReserveDate = dateSelect.value;
      if (timeSelect) selectedReserveTime = timeSelect.value;
    } else {
      selectedReserveDate = '';
      selectedReserveTime = '';
    }
  }

  // 訂單文字建構 (包含立即/預約資訊)
  function buildOrderText() {
    let orderLines = [];
    let hasItems = false;
    for (let [key, qty] of orderMap.entries()) {
      if (qty > 0) {
        hasItems = true;
        const parts = key.split('_');
        let itemName = parts[0];
        const price = parseInt(parts[1], 10);
        orderLines.push(`▸ ${itemName} x ${qty}  (NT$${price * qty})`);
      }
    }
    if (!hasItems) return null;
    const totalPrice = document.getElementById("liveTotal").innerText;
    let modeInfo = "";
    if (orderMode === "now") {
      modeInfo = "🔥 取餐方式：立即取餐 (現場製作後可領取)";
    } else {
      const dateStr = selectedReserveDate || "未選擇";
      const timeStr = selectedReserveTime || "未選擇";
      modeInfo = `📅 預約訂餐：${dateStr} ${timeStr} 取餐 (營業時間11:00-19:00)`;
    }
    let result = `🍢 永勝關東煮 新訂單 🍜\n${modeInfo}\n────────────────\n${orderLines.join("\n")}\n────────────────\n💰 總金額：${totalPrice}\n📞 店家電話：0909-013-660\n🙏 感謝您的訂餐，永勝祝您用餐愉快！`;
    return result;
  }

  // LIFF & 送出訂單
  let liffReady = false;
  let liffObject = null;

  async function initLiff() {
    try {
      await liff.init({ liffId: "2010230179-BFAnjvG2" });
      liffObject = liff;
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        const profile = await liff.getProfile();
        const profileDiv = document.getElementById('profile');
        if (profileDiv) profileDiv.innerHTML = `<span>👋 歡迎，${profile.displayName}</span><span class="guest-name">永勝老朋友</span>`;
      }
      liffReady = true;
    } catch (err) {
      console.warn("LIFF離線模式", err);
      document.getElementById('profile').innerHTML = `<span>📱 離線模式 · 歡迎點餐</span><span class="guest-name">手動複製訂單</span>`;
      liffReady = false;
    }
  }

  async function sendOrderHandler() {
    updateReservationValues();   // 確保最新時間
    const orderText = buildOrderText();
    if (!orderText) {
      alert("⚠️ 尚未點餐，請先選購商品～");
      return;
    }
    if (liffReady && liffObject && liffObject.isLoggedIn && liffObject.isLoggedIn()) {
      try {
        await liffObject.sendMessages([{ type: "text", text: orderText }]);
        alert("✅ 訂單已送出！店家將會依照您的取餐方式準備，感謝訂購。");
      } catch (err) {
        console.error(err);
        alert("❌ 送出失敗：" + (err.message || "請重新操作"));
        fallbackCopyOrder(orderText);
      }
    } else {
      fallbackCopyOrder(orderText);
    }
  }

  function fallbackCopyOrder(orderText) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(orderText).then(() => {
        alert(`📋 訂單已複製到剪貼簿！\n請手動傳送給店家LINE或電話訂購:\n\n${orderText}`);
      }).catch(() => alert(`📝 請手動記錄訂單:\n${orderText}`));
    } else {
      alert(`📝 請截圖此訂單:\n${orderText}\n\n訂購專線:0909013660`);
    }
  }

  // 模式切換
  function bindModeSwitcher() {
    const immediateBtn = document.getElementById('immediateModeBtn');
    const reserveBtn = document.getElementById('reserveModeBtn');
    immediateBtn.addEventListener('click', () => {
      orderMode = 'now';
      immediateBtn.classList.add('active-mode');
      reserveBtn.classList.remove('active-mode');
      refreshReservationPanel();
    });
    reserveBtn.addEventListener('click', () => {
      orderMode = 'reserve';
      reserveBtn.classList.add('active-mode');
      immediateBtn.classList.remove('active-mode');
      refreshReservationPanel();
      // 初始化時間下拉智慧預設
      populateDateSelector();
      populateTimeSelector();
      updateReservationValues();
    });
  }

  // 啟動
  async function start() {
    initOrderMap();
    renderAllMenus();
    initTabs();
    bindModeSwitcher();
    refreshReservationPanel();  // 預設立即模式面板隱藏
    document.getElementById('recalcBtn').addEventListener('click', () => updateTotalSum());
    document.getElementById('sendOrderBtn').addEventListener('click', sendOrderHandler);
    await initLiff();
  }

  start();
</script>
</body>
</html>
